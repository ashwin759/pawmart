version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pet_marketplace_db
    environment:
      POSTGRES_USER: petmarket
      POSTGRES_PASSWORD: petmarket123
      POSTGRES_DB: pet_marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
